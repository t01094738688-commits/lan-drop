name: Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            command: npm run dist:win -- --publish never
            artifact: windows
            files: |
              release/*.exe

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan-drop-${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: 闪传本子 / LAN Drop ${{ github.ref_name }}
          prerelease: true
          body: |
            闪传本子 / LAN Drop ${{ github.ref_name }}

            这是一个早期测试版，适合 Windows 用户和小范围朋友试用。

            下载：
            - Windows：.exe 安装包
            - macOS / Linux：仍在实验构建中，后续补发

            亮点：
            - 手机不用安装 App，电脑打开软件后，手机扫码或打开地址即可互传。
            - 电脑复制文件、图片或截图后，在互传页按 Ctrl + V 可以直接发送。
            - 支持文字、图片、文件互传，也可以把重要内容存入随记。

            注意：
            - 请让手机和电脑连接同一个可信 Wi-Fi 或热点。
            - macOS / Linux 包暂未包含在本次 Release，后续会继续调试云端构建。
          files: release-artifacts/**/*
