name: Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            command: npm run dist:win -- --publish never
            artifact: windows
            files: |
              release/*.exe
              release/*.blockmap
              release/latest.yml
          - name: macOS Apple Silicon
            os: macos-latest
            command: npx electron-builder --mac dmg zip --arm64 --publish never
            artifact: mac-arm64
            files: |
              release/*mac-arm64*.dmg
              release/*mac-arm64*.zip
          - name: macOS Intel
            os: macos-latest
            command: npx electron-builder --mac dmg zip --x64 --publish never
            artifact: mac-x64
            files: |
              release/*mac-x64*.dmg
              release/*mac-x64*.zip
          - name: Linux
            os: ubuntu-latest
            command: npm run dist:linux -- --publish never
            artifact: linux
            files: |
              release/*.AppImage
              release/*.deb

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare macOS icon
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p build/icon.iconset
          sips -z 16 16 build/icon.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32 build/icon.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 build/icon.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64 build/icon.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 build/icon.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256 build/icon.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 build/icon.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512 build/icon.png --out build/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 build/icon.png --out build/icon.iconset/icon_512x512.png
          sips -z 1024 1024 build/icon.png --out build/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/icon.iconset -o build/icon.icns

      - name: Build package
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan-drop-${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: 闪传本子 / LAN Drop ${{ github.ref_name }}
          prerelease: true
          body: |
            闪传本子 / LAN Drop ${{ github.ref_name }}

            这是一个早期测试版，适合小范围朋友试用和反馈。

            下载建议：
            - Windows：下载 `LAN-Drop-*-win-x64.exe`
            - macOS 苹果芯片 M1/M2/M3/M4：下载 `LAN-Drop-*-mac-arm64.dmg`
            - macOS Intel 芯片：下载 `LAN-Drop-*-mac-x64.dmg`
            - Linux：优先下载 `LAN-Drop-*-linux-x64.AppImage`，Debian/Ubuntu 也可以下载 `.deb`

            亮点：
            - 手机不需要安装 App，电脑打开软件后，手机扫码或打开地址即可互传。
            - 支持文件、图片、文字互传。
            - 电脑复制文件、图片或截图后，在互传页按 `Ctrl + V` 可以直接发送。
            - 重要文字和图片可以存入随记。

            注意：
            - 请让手机和电脑连接同一个可信 Wi-Fi 或热点。
            - macOS 包目前没有苹果签名/公证，首次打开可能需要右键点击应用并选择“打开”。
            - Linux 包属于实验测试版，不同发行版表现可能不同。
          files: release-artifacts/**/*
